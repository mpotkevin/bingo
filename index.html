<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>長者賓果產生器 - 鄭凱文職能治療師設計</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        @keyframes zoom-in { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        .animate-fade-in { animation: fade-in 0.4s ease-out forwards; }
        .animate-zoom-in { animation: zoom-in 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- 內嵌 SVG 圖示組件 ---
        const SvgIcon = ({ name, className = "w-5 h-5" }) => {
            const icons = {
                'layout-grid': <path d="M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z"/>,
                'settings': (
                    <g>
                        <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </g>
                ),
                'hash': <path d="M4 9h16M4 15h16M10 3L8 21M16 3l-2 18"/>,
                'type': <path d="M4 7V4h16v3M9 20h6M12 4v16"/>,
                'shapes': (
                    <g>
                        <path d="M8.3 14a.7.7 0 0 1-.6-1.1l5.5-8a.7.7 0 0 1 1.2.3l.3 10.3a.7.7 0 0 1-1.2.5z"/>
                        <path d="M12 14c-4.4 0-8 2-8 4s3.6 4 8 4 8-2 8-4-3.6-4-8-4z"/>
                    </g>
                ),
                'apple': (
                    <g>
                        <path d="M12 22c4.97 0 9-3.024 9-6.75 0-3.153-2.454-4.838-4.5-5.25a3.75 3.75 0 0 0-4.5-3.375 3.75 3.75 0 0 0-4.5 3.375c-2.046.412-4.5 2.097-4.5 5.25C3 18.976 7.03 22 12 22z"/>
                        <path d="M12 5V2"/>
                    </g>
                ),
                'dog': (
                    <g>
                        <path d="M10 6L8 3M14 6l2-3M4.4 11.5L3 17m16.6-5.5L21 17M12 15v2m-3-4a3 3 0 1 0 6 0 3 3 0 1 0-6 0z"/>
                        <path d="M9 13v.01M15 13v.01"/>
                    </g>
                ),
                'upload': (
                    <g>
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
                    </g>
                ),
                'printer': (
                    <g>
                        <path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
                        <path d="M6 14h12v8H6z"/>
                    </g>
                ),
                'chevron-right': <path d="M9 18l6-6-6-6"/>,
                'chevron-left': <path d="M15 18l-6-6 6-6"/>,
                'play-circle': (
                    <g>
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M10 8l6 4-6 4V8z"/>
                    </g>
                ),
                'rotate-ccw': (
                    <g>
                        <path d="M1 4v6h6"/>
                        <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
                    </g>
                ),
                'check-circle-2': (
                    <g>
                        <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/>
                        <path d="M9 12l2 2 4-4"/>
                    </g>
                ),
                'edit-3': (
                    <g>
                        <path d="M12 20h9"/>
                        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
                    </g>
                ),
                'download': (
                    <g>
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
                    </g>
                )
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const GRID_SIZES = [3, 4, 5];
        const DEFAULT_CHINESE = '福祿壽喜春秋冬夏金木水火土天地人平安健康快樂吉祥富貴圓滿長壽大吉好運百福千禧靈睿智勇誠信仁愛'.split('');
        
        const THEMES = {
            numbers: { id: 'numbers', name: '基礎數字', icon: 'hash' },
            chinese: { id: 'chinese', name: '國字版', icon: 'type' },
            shapes: { id: 'shapes', name: '圖形版', icon: 'shapes' },
            fruits: { id: 'fruits', name: '蔬果版', icon: 'apple' },
            animals: { id: 'animals', name: '動物版', icon: 'dog' },
            custom: { id: 'custom', name: '自己上傳', icon: 'upload' }
        };

        const LIBRARIES = {
            numbers: Array.from({ length: 75 }, (_, i) => ({ id: `n-${i+1}`, content: (i + 1).toString(), type: 'text' })),
            shapes: ['🔴', '🟠', '🟡', '🟢', '🔵', '🟣', '⬛', '⬜', '🟥', '🟧', '🟨', '🟩', '🟦', '🟪', '⭐', '🌟', '✨', '🌙', '☀️', '☁️', '❄️', '🔥', '💧', '⚡', '🌀', '💎', '❤️', '🧡', '💛', '💚', '💙', '💜'].map((s, i) => ({ id: `s-${i}`, content: s, type: 'text' })),
            fruits: ['🍎', '🍏', '🍐', '🍊', '🍋', '🍌', '🍉', '🍇', '🍓', '🫐', '🍈', '🍒', '🍑', '🥭', '🍍', '🥥', '🍅', '🥑', '🥦', '🥬', '🥒', '🌽', '🥕', '🥔', '🍠', '🍄', '🥜', '🌰', '🧅', '🧄', '🥝'].map((f, i) => ({ id: `f-${i}`, content: f, type: 'text' })),
            animals: ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼', '🐨', '🐯', '🦁', '🐮', '🐷', '🐸', '🐵', '🐔', '🐧', '🐦', '🐤', '🦆', '🦅', '🦉', '🐺', '🐗', '🐴', '🦄', '🐝', '🐛', '🦋', '🐌', '🐞'].map((a, i) => ({ id: `a-${i}`, content: a, type: 'text' }))
        };

        function App() {
            const [gridSize, setGridSize] = useState(4);
            const [activeTheme, setActiveTheme] = useState('numbers');
            const [selectedItems, setSelectedItems] = useState(new Set());
            const [customItems, setCustomItems] = useState([]);
            const [customChineseInput, setCustomChineseInput] = useState('');
            const [copies, setCopies] = useState(1);
            const [isGenerating, setIsGenerating] = useState(false);
            const [step, setStep] = useState(1); 
            const [showResetModal, setShowResetModal] = useState(false);
            const [drawnItems, setDrawnItems] = useState([]);
            const [currentDrawn, setCurrentDrawn] = useState(null);
            const [isRolling, setIsRolling] = useState(false);

            const chineseLibrary = useMemo(() => {
                const base = customChineseInput.length > 0 ? customChineseInput.split('') : DEFAULT_CHINESE;
                return base.map((c, i) => ({ id: `c-${i}`, content: c, type: 'text' }));
            }, [customChineseInput]);

            const currentLibrary = useMemo(() => {
                if (activeTheme === 'custom') return customItems;
                if (activeTheme === 'chinese') return chineseLibrary;
                return LIBRARIES[activeTheme] || [];
            }, [activeTheme, customItems, chineseLibrary]);

            useEffect(() => {
                const needed = gridSize * gridSize;
                const initialSelection = new Set();
                currentLibrary.slice(0, Math.max(needed, 16)).forEach(item => initialSelection.add(item.id));
                setSelectedItems(initialSelection);
            }, [activeTheme, gridSize, currentLibrary]);

            const selectedPool = useMemo(() => currentLibrary.filter(item => selectedItems.has(item.id)), [currentLibrary, selectedItems]);

            const previewNumbers = useMemo(() => {
                const arr = Array.from({ length: gridSize * gridSize }, (_, i) => (i + 1).toString());
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            }, [gridSize, step]);

            const handleFileUpload = (e) => {
                const files = Array.from(e.target.files);
                const newItems = files.map((file, index) => ({
                    id: `custom-${Date.now()}-${index}`,
                    content: URL.createObjectURL(file),
                    type: 'image'
                }));
                setCustomItems([...customItems, ...newItems]);
                setActiveTheme('custom');
            };

            const toggleItem = (id) => {
                const newSelection = new Set(selectedItems);
                if (newSelection.has(id)) newSelection.delete(id);
                else newSelection.add(id);
                setSelectedItems(newSelection);
            };

            const shuffle = (array) => {
                const newArr = [...array];
                for (let i = newArr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
                }
                return newArr;
            };

            const generatePDF = async () => {
                if (selectedPool.length < gridSize * gridSize) return;
                setIsGenerating(true);
                try {
                    const { jsPDF } = window.jspdf;
                    const html2canvas = window.html2canvas;
                    const pdf = new jsPDF('p', 'mm', 'a4');
                    const container = document.getElementById('print-container');
                    container.style.display = 'block';

                    for (let i = 0; i < copies; i++) {
                        const shuffled = shuffle(selectedPool).slice(0, gridSize * gridSize);
                        renderBingoToDiv(shuffled, i + 1);
                        const pageElement = document.getElementById(`bingo-page-${i}`);
                        const canvas = await html2canvas(pageElement, { 
                            scale: 2, 
                            useCORS: true,
                            backgroundColor: '#ffffff'
                        });
                        const imgData = canvas.toDataURL('image/png');
                        if (i > 0) pdf.addPage();
                        pdf.addImage(imgData, 'PNG', 0, 0, 210, 297);
                    }
                    pdf.save(`賓果卡_${new Date().getTime()}.pdf`);
                    container.style.display = 'none';
                } catch (err) {
                    console.error(err);
                    alert("PDF 生成失敗");
                } finally {
                    setIsGenerating(false);
                }
            };

            const renderBingoToDiv = (items, pageNum) => {
                const container = document.getElementById(`bingo-page-${pageNum - 1}`);
                if (!container) return;
                container.innerHTML = `
                    <div style="width: 210mm; height: 297mm; display: flex; flex-direction: column; align-items: center; justify-content: center; background: white; padding: 0; margin: 0; box-sizing: border-box; overflow: hidden; position: relative;">
                        <h1 style="margin: 0 0 8mm 0; font-size: 32pt; font-weight: 900; font-family: sans-serif; color: #000; text-align: center;">賓果遊戲卡</h1>
                        <div style="width: 175mm; display: flex; justify-content: space-between; margin-bottom: 15mm; font-family: sans-serif; font-size: 16pt; font-weight: bold; border-bottom: 2px solid #eee; padding-bottom: 8px;">
                            <span>姓名：________________</span>
                            <span>日期：____ 年 ____ 月 ____ 日</span>
                        </div>
                        <div style="display: grid; grid-template-columns: repeat(${gridSize}, 1fr); width: 175mm; height: 175mm; border: 5pt solid #000; background: #000; gap: 5pt; box-sizing: border-box; overflow: hidden;">
                            ${items.map(item => {
                                return `
                                <div style="background: white; display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; aspect-ratio: 1/1; overflow: hidden; box-sizing: border-box;">
                                    ${item.type === 'text' 
                                        ? `<div style="display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; transform: translateY(-15%);">
                                            <span style="font-size: ${gridSize === 5 ? '58pt' : gridSize === 4 ? '72pt' : '96pt'}; font-weight: 900; font-family: sans-serif; line-height: 1; display: block; margin: 0; padding: 0; text-align: center;">${item.content}</span>
                                          </div>`
                                        : `<div style="display: flex; align-items: center; justify-content: center; width: 100%; height: 100%;">
                                            <img src="${item.content}" style="max-width: 90%; max-height: 90%; object-fit: contain; display: block;" />
                                          </div>`
                                    }
                                </div>
                                `}).join('')}
                        </div>
                        <div style="margin-top: 15mm; font-family: sans-serif; text-align: center;">
                            <p style="font-size: 11pt; color: #666; margin: 0;">
                                <a href="https://www.facebook.com/mpotkevin" target="_blank" style="color: #666; text-decoration: none;">設計：職能治療師 - 鄭凱文</a>
                            </p>
                        </div>
                    </div>
                `;
            };

            const drawNext = () => {
                const available = selectedPool.filter(item => !drawnItems.find(d => d.id === item.id));
                if (available.length === 0) {
                    alert("已經全部抽完囉！");
                    return;
                }
                setIsRolling(true);
                let count = 0;
                const interval = setInterval(() => {
                    setCurrentDrawn(available[Math.floor(Math.random() * available.length)]);
                    count++;
                    if (count > 12) {
                        clearInterval(interval);
                        const final = available[Math.floor(Math.random() * available.length)];
                        setCurrentDrawn(final);
                        setDrawnItems(prev => [final, ...prev]);
                        setIsRolling(false);
                    }
                }, 80);
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="bg-white border-b sticky top-0 z-30 shadow-sm px-4 h-16 flex items-center justify-between text-slate-800">
                        <div className="flex items-center gap-2">
                            <div className="bg-indigo-600 p-2 rounded-lg text-white">
                                <SvgIcon name="layout-grid" />
                            </div>
                            <h1 className="text-xl font-bold tracking-tight">長者賓果產生器</h1>
                        </div>
                        <div className="hidden md:flex gap-4 text-xs font-bold uppercase tracking-wider text-slate-400">
                            <span className={step === 1 ? "text-indigo-600" : ""}>1. 設定</span>
                            <span className={step === 2 ? "text-indigo-600" : ""}>2. 挑選</span>
                            <span className={step === 3 ? "text-indigo-600" : ""}>3. 輸出</span>
                            <span className={step === 4 ? "text-indigo-600" : ""}>4. 遊戲</span>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto p-4 md:p-8 flex-grow w-full text-slate-800">
                        {step === 1 && (
                            <div className="bg-white rounded-3xl p-8 shadow-sm border space-y-8 animate-fade-in">
                                <h2 className="text-2xl font-black mb-2">1. 基本設定</h2>
                                <div className="grid md:grid-cols-2 gap-10">
                                    <div className="space-y-4">
                                        <label className="text-sm font-bold text-slate-500 uppercase">賓果盤尺寸</label>
                                        <div className="flex gap-4">
                                            {GRID_SIZES.map(size => (
                                                <button key={size} onClick={() => setGridSize(size)} className={`flex-1 py-6 rounded-2xl border-2 transition-all ${gridSize === size ? "border-indigo-600 bg-indigo-50 text-indigo-700 shadow-md" : "border-slate-100 bg-white hover:border-slate-300"}`}>
                                                    <div className="text-2xl font-black">{size}×{size}</div>
                                                    <div className="text-xs opacity-60">{size*size} 格</div>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="space-y-4">
                                        <label className="text-sm font-bold text-slate-500 uppercase">選擇主題庫</label>
                                        <div className="grid grid-cols-2 gap-2">
                                            {Object.values(THEMES).map(t => (
                                                <button key={t.id} onClick={() => setActiveTheme(t.id)} className={`flex items-center gap-2 p-4 rounded-xl border text-sm font-medium transition-all ${activeTheme === t.id ? "bg-indigo-600 text-white shadow-md" : "bg-white hover:bg-slate-50 text-slate-700"}`}>
                                                    <SvgIcon name={t.icon} className="w-4 h-4" /> {t.name}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                                <div className="flex justify-end pt-4">
                                    <button onClick={() => setStep(2)} className="bg-indigo-600 text-white px-10 py-4 rounded-2xl font-bold shadow-lg flex items-center gap-2 hover:bg-indigo-700 transition-all">下一步 <SvgIcon name="chevron-right" /></button>
                                </div>
                            </div>
                        )}

                        {step === 2 && (
                            <div className="bg-white rounded-3xl p-8 shadow-sm border space-y-6 animate-fade-in">
                                <div className="flex justify-between items-end border-b pb-6 text-slate-800">
                                    <div className="w-full">
                                        <h2 className="text-2xl font-black mb-2">2. 挑選內容</h2>
                                        <div className="flex items-center justify-between">
                                            <p className="text-slate-500 text-sm">已選: <span className="text-indigo-600 font-bold">{selectedItems.size}</span> (需至少 {gridSize*gridSize} 個項目)</p>
                                            <div className="flex gap-2 text-slate-800">
                                                <button onClick={() => setSelectedItems(new Set(currentLibrary.map(i => i.id)))} className="text-xs font-bold bg-slate-100 px-4 py-2 rounded-lg hover:bg-slate-200 transition-colors">全選</button>
                                                <button onClick={() => setSelectedItems(new Set())} className="text-xs font-bold bg-slate-100 px-4 py-2 rounded-lg text-red-500 hover:bg-red-50 transition-colors">清空</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {activeTheme === 'chinese' && (
                                    <div className="space-y-3 p-4 bg-indigo-50/50 rounded-2xl border border-indigo-100">
                                        <label className="text-sm font-bold text-indigo-700 flex items-center gap-2"><SvgIcon name="edit-3" className="w-4 h-4" /> 自定義國字 (請直接輸入)</label>
                                        <input type="text" value={customChineseInput} onChange={(e) => setCustomChineseInput(e.target.value)} placeholder="例如：春、福、喜、樂..." className="w-full p-4 rounded-xl border-2 border-indigo-100 focus:border-indigo-500 outline-none transition-all" />
                                    </div>
                                )}

                                {activeTheme === 'custom' && (
                                    <div className="border-2 border-dashed border-indigo-200 bg-indigo-50/30 p-8 rounded-2xl text-center cursor-pointer hover:bg-indigo-50 transition-colors">
                                        <input type="file" multiple accept="image/*" onChange={handleFileUpload} id="up" className="hidden" />
                                        <label htmlFor="up" className="cursor-pointer flex flex-col items-center gap-3">
                                            <SvgIcon name="upload" className="w-8 h-8 text-indigo-600" />
                                            <p className="font-bold text-slate-700">上傳專屬圖片</p>
                                        </label>
                                    </div>
                                )}

                                <div className="grid grid-cols-4 sm:grid-cols-6 lg:grid-cols-7 gap-3 max-h-[45vh] overflow-y-auto p-4 bg-slate-100 rounded-2xl custom-scrollbar border border-slate-200">
                                    {currentLibrary.map(item => (
                                        <div key={item.id} onClick={() => toggleItem(item.id)} className={`relative aspect-square rounded-2xl cursor-pointer flex items-center justify-center border-4 transition-all ${selectedItems.has(item.id) ? "border-indigo-500 bg-white scale-95 shadow-md" : "border-white bg-white/60 hover:bg-white"}`}>
                                            <div className="w-[85%] h-[85%] flex items-center justify-center overflow-hidden">
                                                {item.type === 'text' ? (
                                                    <span className="text-3xl font-black text-slate-800">{item.content}</span>
                                                ) : (
                                                    <img src={item.content} className="max-w-full max-h-full object-contain" />
                                                )}
                                            </div>
                                            {selectedItems.has(item.id) && <div className="absolute -top-1 -right-1 bg-indigo-600 text-white rounded-full p-0.5 shadow-sm border border-white"><SvgIcon name="check-circle-2" className="w-4 h-4" /></div>}
                                        </div>
                                    ))}
                                </div>

                                <div className="flex justify-between pt-6">
                                    <button onClick={() => setStep(1)} className="px-8 py-4 font-bold border border-slate-200 rounded-2xl hover:bg-slate-50 transition-colors flex items-center gap-2 text-slate-600">
                                        <SvgIcon name="chevron-left" className="w-4 h-4"/> 上一步
                                    </button>
                                    <button onClick={() => setStep(3)} disabled={selectedItems.size < gridSize*gridSize} className={`px-10 py-4 rounded-2xl font-bold shadow-lg transition-all ${selectedItems.size < gridSize*gridSize ? "bg-slate-200 text-slate-400 cursor-not-allowed" : "bg-indigo-600 text-white hover:bg-indigo-700"}`}>下一步</button>
                                </div>
                            </div>
                        )}

                        {step === 3 && (
                            <div className="bg-white rounded-3xl p-8 shadow-sm border space-y-8 animate-fade-in">
                                <h2 className="text-2xl font-black mb-2">3. 輸出設定與份數</h2>
                                <div className="grid md:grid-cols-2 gap-12 text-slate-700">
                                    <div className="space-y-8">
                                        <div className="space-y-4">
                                            <label className="block text-sm font-bold text-slate-500 uppercase tracking-widest">要列印幾份？ (自動隨機洗牌)</label>
                                            <input type="number" min="1" max="100" value={copies} onChange={(e) => setCopies(Math.max(1, parseInt(e.target.value) || 1))} className="w-full text-4xl font-black text-indigo-600 border-2 border-indigo-100 rounded-2xl p-5 focus:border-indigo-500 outline-none transition-all" />
                                        </div>
                                        <div className="p-4 bg-amber-50 rounded-2xl border border-amber-100 text-amber-900 text-sm">
                                            <p className="font-bold flex items-center gap-2 mb-1"><SvgIcon name="edit-3" className="w-4 h-4" /> 紙本作業提醒</p>
                                            <p>生成的 PDF 將包含姓名、日期填寫欄，標題為「賓果遊戲卡」。</p>
                                        </div>
                                    </div>
                                    <div className="flex flex-col items-center">
                                        <p className="mb-4 text-xs font-bold text-slate-400 uppercase tracking-widest">排版範本預覽</p>
                                        <div className="w-64 aspect-[1/1.4] bg-white shadow-2xl rounded-sm border p-4 flex flex-col items-center justify-center gap-4">
                                            <div className="w-full h-4 border-b border-slate-100"></div>
                                            <div className={`grid grid-cols-${gridSize} gap-1 w-full aspect-square bg-slate-900 border-2 border-slate-900`}>
                                                {previewNumbers.map((num, i) => (
                                                    <div key={i} className="bg-white flex items-center justify-center text-xl font-black text-slate-800">{num}</div>
                                                ))}
                                            </div>
                                            <div className="w-1/2 h-1 bg-slate-50"></div>
                                        </div>
                                    </div>
                                </div>
                                <div className="flex justify-between pt-8">
                                    <button onClick={() => setStep(2)} className="px-8 py-4 font-bold border border-slate-200 rounded-2xl hover:bg-slate-50 transition-colors flex items-center gap-2 text-slate-600">
                                        <SvgIcon name="chevron-left" className="w-4 h-4"/> 上一步
                                    </button>
                                    <div className="flex gap-4">
                                        <button onClick={() => setStep(4)} className="bg-white border-2 border-indigo-600 text-indigo-600 px-8 py-4 rounded-2xl font-bold hover:bg-indigo-50 transition-all shadow-sm">開啟抽籤器</button>
                                        <button onClick={generatePDF} disabled={isGenerating} className="bg-green-600 text-white px-10 py-4 rounded-2xl font-bold shadow-lg flex items-center gap-2 hover:bg-green-700 transition-all disabled:bg-slate-300">
                                            {isGenerating ? "處理中..." : <><SvgIcon name="download" className="w-5 h-5"/> 下載 PDF</>}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {step === 4 && (
                            <div className="bg-white rounded-3xl p-6 md:p-8 shadow-sm border space-y-6 animate-zoom-in">
                                <div className="flex justify-between items-center border-b pb-4 text-slate-800">
                                    <h2 className="text-xl md:text-2xl font-black flex items-center gap-3 text-indigo-600"><SvgIcon name="play-circle" /> 現場互動抽籤器</h2>
                                    <button onClick={() => setShowResetModal(true)} className="text-slate-400 hover:text-red-500 flex items-center gap-2 font-bold text-sm transition-colors px-3 py-1 hover:bg-red-50 rounded-lg">
                                        <SvgIcon name="rotate-ccw" className="w-4 h-4" /> 重置遊戲
                                    </button>
                                </div>

                                <div className="grid lg:grid-cols-12 gap-8">
                                    <div className="lg:col-span-8 flex flex-col items-center justify-center bg-slate-900 rounded-[2.5rem] p-8 min-h-[400px] shadow-2xl relative border-b-4 border-indigo-600 overflow-hidden">
                                        {currentDrawn ? (
                                            <div className={`flex flex-col items-center gap-6 animate-zoom-in ${isRolling ? 'opacity-40' : 'opacity-100'}`}>
                                                <div className="bg-white p-8 rounded-[2.5rem] shadow-2xl border-8 border-indigo-500 flex items-center justify-center w-64 h-64 md:w-80 md:h-80 overflow-hidden">
                                                    {currentDrawn.type === 'text' ? (
                                                        <div className="w-full h-full flex items-center justify-center transform translateY-[-15%]">
                                                            <span className="text-[120px] md:text-[160px] font-black text-slate-900 leading-none">{currentDrawn.content}</span>
                                                        </div>
                                                    ) : (
                                                        <img src={currentDrawn.content} className="max-w-[95%] max-h-[95%] object-contain" />
                                                    )}
                                                </div>
                                                {!isRolling && (
                                                    <div className="text-white text-3xl font-black bg-indigo-600 px-10 py-3 rounded-full shadow-lg animate-bounce">
                                                        請圈選：{currentDrawn.type === 'text' ? currentDrawn.content : '這個圖案'}
                                                    </div>
                                                )}
                                            </div>
                                        ) : (
                                            <div className="text-slate-500 text-center">
                                                <SvgIcon name="play-circle" className="w-20 h-20 mx-auto mb-4 opacity-20 text-white" />
                                                <p className="text-white text-xl font-bold">準備好開始挑戰了嗎？</p>
                                                <p className="text-slate-400 mt-1">點擊下方按鈕開始隨機抽籤</p>
                                            </div>
                                        )}
                                        <button onClick={drawNext} disabled={isRolling} className={`mt-10 bg-white text-slate-900 w-full max-w-sm py-6 rounded-2xl text-2xl font-black shadow-[0_10px_30px_rgba(0,0,0,0.3)] hover:scale-105 transition-all ${isRolling ? 'opacity-50 cursor-wait' : 'hover:bg-indigo-50'}`}>
                                            {isRolling ? '抽籤中...' : '抽下一球'}
                                        </button>
                                    </div>

                                    <div className="lg:col-span-4 bg-slate-100 rounded-3xl p-5 border border-slate-200 flex flex-col max-h-[500px] shadow-inner">
                                        <h3 className="font-black text-slate-500 text-xs uppercase mb-4 flex justify-between tracking-widest">已抽出的紀錄 ({drawnItems.length})</h3>
                                        <div className="grid grid-cols-6 lg:grid-cols-7 gap-1.5 overflow-visible pr-1 custom-scrollbar">
                                            {drawnItems.map((item, idx) => (
                                                <div key={idx} className="bg-white rounded-lg border border-slate-200 flex items-center justify-center aspect-square relative shadow-sm z-0 hover:border-indigo-300 transition-colors">
                                                    <span className="absolute top-0.5 left-0.5 text-[6px] bg-indigo-50 text-indigo-600 w-3 h-3 rounded-full flex items-center justify-center font-black z-20 shadow-xs">
                                                        {drawnItems.length - idx}
                                                    </span>
                                                    {/* 已抽紀錄區：修正位移補償至 -10% 且自上傳圖片佔比 85% */}
                                                    <div className="w-full h-full flex items-center justify-center pointer-events-none z-10 overflow-visible">
                                                        {item.type === 'text' ? (
                                                            <div className="w-full h-full flex items-center justify-center transform scale-[3]">
                                                                <span className="text-[12px] font-black text-slate-900 leading-none transform -translate-y-[10%] inline-block">{item.content}</span>
                                                            </div>
                                                        ) : (
                                                            <div className="w-full h-full flex items-center justify-center">
                                                                <img src={item.content} className="w-[85%] h-[85%] object-contain" />
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                            ))}
                                            {drawnItems.length === 0 && <div className="col-span-full py-20 text-center text-slate-400 text-xs italic">尚未開始</div>}
                                        </div>
                                    </div>
                                </div>
                                <div className="pt-2">
                                    <button onClick={() => setStep(3)} className="text-slate-500 font-bold flex items-center gap-2 hover:bg-slate-100 px-4 py-2 rounded-xl transition-colors">
                                        <SvgIcon name="chevron-left" className="w-4 h-4"/> 返回設定
                                    </button>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="text-center py-8 text-slate-400 text-sm border-t bg-white">
                        <a href="https://www.facebook.com/mpotkevin" target="_blank" rel="noopener noreferrer" className="text-slate-400 font-bold hover:text-indigo-600 transition-colors underline decoration-dotted underline-offset-4">
                            設計：職能治療師 - 鄭凱文
                        </a>
                    </footer>

                    {showResetModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2rem] p-8 max-w-sm w-full shadow-2xl animate-zoom-in border border-slate-100">
                                <div className="w-16 h-16 bg-red-50 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4 text-red-600">
                                    <SvgIcon name="rotate-ccw" className="w-8 h-8" />
                                </div>
                                <h3 className="text-xl font-bold text-center mb-2 text-slate-800">確定要重新開始？</h3>
                                <p className="text-slate-500 text-center text-sm mb-8">目前的抽籤紀錄將會被全部清除，此動作無法復原。</p>
                                <div className="flex gap-3">
                                    <button onClick={() => setShowResetModal(false)} className="flex-1 py-3 font-bold text-slate-600 bg-slate-100 rounded-xl hover:bg-slate-200 transition-colors">取消</button>
                                    <button onClick={() => { setDrawnItems([]); setCurrentDrawn(null); setShowResetModal(false); }} className="flex-1 py-3 font-bold text-white bg-red-600 rounded-xl hover:bg-red-700 shadow-lg shadow-red-100 transition-colors">確定重置</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div id="print-container" style={{ position: 'absolute', left: '-9999px', top: 0, width: '210mm', display: 'none', background: 'white' }}>
                        {Array.from({ length: copies }).map((_, i) => (
                            <div key={i} id={`bingo-page-${i}`} style={{ width: '210mm', height: '297mm', background: 'white' }}></div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
